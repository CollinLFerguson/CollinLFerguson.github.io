<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link rel="stylesheet" href="./style/stylesheets/fonts.css">
        <link rel="stylesheet" href="./style/stylesheets/retro_styles.css">
        <link rel="stylesheet" href="./style/stylesheets/styles.css">
        <script type="module" src="./src/functions/utils/loadWebComponents.js"></script>
    </head>
    <body>
        <div class="effects-container retro-container scanline-effect old-crt-monitor">
            <header>
                <h1></h1>
                <nav role="navigation">
                    <ul>
                        <li class="alert"><a href="#screen-1">SCREEN 1</a></li>
                    </ul>
                </nav>
            </header>
            <main>
                <section id="identity">
                    <div style="width:100%"
                        <header>
                            <h2>Identity</h2>
                        </header>
                    <div class="statsgrid">
                        <div class="stat-box IDENTITY">
                            <div class="box-label">NAME</div>
                            <div class="input-row">
                                <div class="input-row">
                                    <input type="text" id="identity_name">
                                </div>
                            </div>
                        </div>
                        <div class="stat-box IDENTITY">
                            <div class="box-label">ROLE</div>
                            <div class="input-row">
                                <div class="input-row">
                                    <input type="text" id="identity_role">
                                </div>
                            </div>
                        </div>
                        <div class="stat-box IDENTITY">
                            <div class="box-label">ORIGIN</div>
                            <div class="input-row">
                                <div class="input-row">
                                    <input type="text" id="identity_origin">
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
                <section id="stats">
                    <div style="width:100%">
                        <header>
                            <h2>Stats</h2>
                        </header>
                        <div class="statsgrid">
                            <stat-box-curr-max label="INT"></stat-box-curr-max>
                            <!-- <div class="stat-box STAT">
                                <div class="box-label">INT</div>
                                <div class="input-row">
                                    <div class="input-group">
                                        <input type="number" id="stat_int_curr">
                                    </div>
                                    <p class="stat-divider">/</p>
                                    <div class="input-group">
                                        <input type="number" id="stat_int_max">
                                    </div>
                                </div>
                            </div> -->
                            <div class="stat-box STAT">
                                <div class="box-label">REF</div>
                                <div class="input-row">
                                    <input type="number" id="stat_ref_curr">
                                    <p class="stat-divider">/</p>
                                    <input type="number" id="stat_ref_max">
                                </div>
                            </div>

                            <div class="stat-box STAT">
                                <div class="box-label">DEX</div>
                                <div class="input-row">
                                    <input type="number" id="stat_dex_curr">
                                    <p class="stat-divider">/</p>
                                    <input type="number" id="stat_dex_max">
                                </div>
                            </div>

                            <div class="stat-box STAT">
                                <div class="box-label">TECH</div>
                                <div class="input-row">
                                    <input type="number" id="stat_tech_curr">
                                    <p class="stat-divider">/</p>
                                    <input type="number" id="stat_tech_max">
                                </div>
                            </div>

                            <div class="stat-box STAT">
                                <div class="box-label">COOL</div>
                                <div class="input-row">
                                    <input type="number" id="stat_cool_curr">
                                    <p class="stat-divider">/</p>
                                    <input type="number" id="stat_cool_max">
                                </div>
                            </div>

                            <div class="stat-box STAT">
                                <div class="box-label">WILL</div>
                                <div class="input-row">
                                    <input type="number" id="stat_will_curr">
                                    <p class="stat-divider">/</p>
                                    <input type="number" id="stat_will_max">
                                </div>
                            </div>

                            <div class="stat-box STAT">
                                <div class="box-label">LUCK</div>
                                <div class="input-row">
                                    <input type="number" id="stat_luck_curr">
                                    <p class="stat-divider">/</p>
                                    <input type="number" id="stat_luck_max">
                                </div>
                            </div>

                            <div class="stat-box STAT">
                                <div class="box-label">MOVE</div>
                                <div class="input-row">
                                    <input type="number" id="stat_move_curr">
                                    <p class="stat-divider">/</p>
                                    <input type="number" id="stat_move_max">
                                </div>
                            </div>

                            <div class="stat-box STAT">
                                <div class="box-label">BODY</div>
                                <div class="input-row">
                                    <input type="number" id="stat_body_curr">
                                    <p class="stat-divider">/</p>
                                    <input type="number" id="stat_body_max">
                                </div>
                            </div>

                            <div class="stat-box STAT">
                                <div class="box-label">EMP</div>
                                <div class="input-row">
                                    <input type="number" id="stat_emp_curr">
                                    <p class="stat-divider">/</p>
                                    <input type="number" id="stat_emp_max">
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
                <section id="Skills">
                </section>
            </main>
            <footer>
                <p></p>
            </footer>
        </div>
    </body>
</html>
