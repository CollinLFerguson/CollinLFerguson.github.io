<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Fallout-Punk Character Sheet</title>
        <link rel="stylesheet" href="./style/stylesheets/fonts.css">
        <link rel="stylesheet" href="./style/stylesheets/retro_styles.css">
        <link rel="stylesheet" href="./style/stylesheets/styles.css">
        <script type="module" src="./src/functions/utils/loadWebComponents.js"></script>
    </head>
    <body>
        <div class="effects-container retro-effects scanline-effect old-crt-monitor">
        <div class="retro-container">

            
            <header>
                <h1></h1>
                <nav role="navigation">
                    <ul>
                        <li class="alert"><a href="#screen-1">SCREEN 1</a></li>
                    </ul>
                </nav>
            </header>
            <main>
                <section id="identity">
                    <div style="width:100%"
                        <header>
                            <h2>Identity</h2>
                        </header>
                    <div class="statsgrid">
                        <labeled-text-box id="identifier_name" label="NAME"></labeled-text-box>
                        <labeled-text-box id="identifier_role" label="ROLE"></labeled-text-box>
                        <labeled-text-box id="identifier_origin" label="ORIGIN"></labeled-text-box>
                    </div>
                </section>
                <section id="stats">
                    <div style="width:100%">
                        <header>
                            <h2>Stats</h2>
                        </header>
                        <div class="statsgrid">
                            <stat-box-curr-max id="stat_int" label="INT"></stat-box-curr-max>
                            <stat-box-curr-max id="stat_ref" label="REF"></stat-box-curr-max>
                            <stat-box-curr-max id="stat_dex" label="DEX"></stat-box-curr-max>
                            <stat-box-curr-max id="stat_tech" label="TECH"></stat-box-curr-max>
                            <stat-box-curr-max id="stat_cool" label="COOL"></stat-box-curr-max>
                            <stat-box-curr-max id="stat_will" label="WILL"></stat-box-curr-max>
                            <stat-box-curr-max id="stat_luck" label="LUCK"></stat-box-curr-max>
                            <stat-box-curr-max id="stat_move" label="MOVE"></stat-box-curr-max>
                            <stat-box-curr-max id="stat_body" label="BODY"></stat-box-curr-max>
                            <stat-box-curr-max id="stat_emp" label="EMP"></stat-box-curr-max>
                        </div>
                    </div>
                </section>
                <section id="Skills">
                        <header>
                        <h2>Stats</h2>
                    </header>
                    <skill-table label="Skills" id="skills-table"></skill-table>
                </section>
            </main>
            <footer>
                <p></p>
            </footer>
        </div>
        </div>
    </body>
</html>

<script>
    function initializeStats(){
        const table = document.getElementById("skills-table");

        table.stats = [
            { name: "BODY", value: 2 },
            { name: "DEX", value: 3 },
            { name: "INT", value: 5 }
        ];

        table.addEmptyRow();
    }

    document.addEventListener('DOMContentLoaded', initializeStats)

</script>
